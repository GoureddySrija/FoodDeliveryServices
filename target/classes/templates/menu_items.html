<title>Restaurants</title>
<script>
    function getMenuItemsByRestaurantId() {
    // Get the customer ID from the input field
    var restaurantId = prompt("Please enter the Restaurant ID:");
        // If user provides a customer ID
        if (restaurantId !== null && restaurantId.trim() !== "") {
            // Redirect to the URL with the provided customer ID
            window.location.href = `/fooddeliveryapp/api/${restaurantId}/menuItems`;
        }
   }
    function addmenuItemsByRestaurantId() {
    // Get the restaurant ID from the input field
    var restaurantId = prompt("Please enter the Restaurant ID:");
    // Parse the restaurant ID as an integer
    var restaurantIdInt = parseInt(restaurantId);
    // Check if the parsed integer is a valid number
    if (!isNaN(restaurantIdInt)) {
        // Redirect to the URL with the provided restaurant ID
        window.location.href = `/fooddeliveryapp/api/${restaurantIdInt}/menu/add`;
    }
}
   function updateMenuItem() {
    // Get the restaurant ID and item ID from the input fields
    var restaurantId = prompt("Please enter the Restaurant ID:");
    var itemId = prompt("Please enter the Item ID:");
    // If user provides both IDs
    if (restaurantId !== null && restaurantId.trim() !== "" && itemId !== null && itemId.trim() !== "") {
        // Redirect to the URL with the provided IDs
        window.location.href = `/fooddeliveryapp/api/${restaurantId}/menu/update/${itemId}`;
    }
}
 
</script>

			grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
			gap: 20px;
			padding: 20px;
		}
		.card {
			background-color: rgba(255, 255, 255, 0.9);
			border-radius: 10px;
			box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
			overflow: hidden;
			transition: transform 0.3s ease;
		}
		.card:hover {
			transform: translateY(-5px);
		}
		.card-content {
			padding: 20px;
			text-align: center;
		}
		h2 {
			color: #333;
			font-size: 20px;
			margin-bottom: 10px;
		}
		p {
			color: #666;
			font-size: 16px;
			margin-bottom: 20px;
		}
		.btn {
			padding: 10px 20px;
			font-size: 16px;
			cursor: pointer;
			border: none;
			border-radius: 5px;
			background: linear-gradient(to right,#bdc3c7,#2F4F4F);
			color: white;
			text-transform: uppercase;
			transition: background-color 0.3s ease;
		}
		.btn:hover {
			background: linear-gradient(to right, #9a9a9a, #4fa3f0);
		}
		a {
			text-decoration: none;
			color: white;
		}
		h1 {
			font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
		}
</style>
</head>
<body>
 
<div class="header">
<h1>Menu Items</h1>
</div>
 
<div class="container">
<div class="card">
<div class="card-content">
<h2>All MenuItems</h2>
<button class="btn" onclick="getMenuItemsByRestaurantId()">GET</button>
<p>Retrieve all menuitem details from the suppliers table.</p>
</div>
</div>
 
 
<div class="card">

</div>
</div>
 
 
<div class="card">
<div class="card-content">
<h2>Update MenuItems</h2>

</div>
</div> 
</body>
