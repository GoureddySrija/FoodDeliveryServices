<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Restaurant</title>
</head>
<body>
    <h2>Add Restaurant</h2>
    <form th:action="@{/api/add}" th:object="${restaurant}" method="post">
        <label for="restaurantId">Restaurant ID:</label>
        <input type="text" id="restaurantId" name="restaurantId" th:field="*{restaurant_id}"/><br/>
        
        <label for="restaurantName">Restaurant Name:</label>
        <input type="text" id="restaurantName" name="restaurantName" th:field="*{restaurant_name}"/><br/>
        
        <label for="restaurantAddress">Restaurant Address:</label>
        <input type="text" id="restaurantAddress" name="restaurantAddress" th:field="*{restaurant_address}"/><br/>
        
        <label for="restaurantPhone">Restaurant Phone:</label>
        <input type="text" id="restaurantPhone" name="restaurantPhone" th:field="*{restaurant_phone}"/><br/>
        
        <input type="submit" value="Submit"/>
    </form>
</body>
</html>
