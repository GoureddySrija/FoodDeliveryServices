<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Update Menu Item</title>
</head>
<body>
<h2>Update Menu Item</h2>
<form action="#" th:action="@{'/api/' + ${menuItems.restaurants.restaurant_id} + '/menu/update/' + ${menuItems.item_id}}" th:object="${menuItems}" method="post">
<input type="hidden" th:field="*{item_id}">
<input type="hidden" th:field="*{restaurants.restaurant_id}">
<label>Item Name:</label>
<input type="text" th:field="*{item_name}" required><br>
<label>Item Description:</label>
<input type="text" th:field="*{item_description}" required><br>
<label>Item Price:</label>
<input type="number" step="0.01" th:field="*{item_price}" required><br>
<button type="submit">Submit</button>
</form>
</body>
</html>
