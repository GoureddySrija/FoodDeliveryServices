<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Add Item Details</title>
</head>
<body>
<h1>Add Item Details</h1>
<form action="/fooddeliveryapp/api/{restaurant_id}/menu/add" method="post" th:action="@{'/api/' + ${restaurant_id} + '/menu/add'}" th:object="${menuItems}">
<input type="hidden" th:name="restaurant_id" th:value="${restaurant_id}">
<label for="itemId">Item Id:</label>
<input type="text" id="itemId" th:field="*{item_id}"><br>
<label for="itemName">Item Name:</label>
<input type="text" id="itemName" th:field="*{item_name}"><br>
<label for="itemDescription">Item Description:</label>
<input type="text" id="itemDescription" th:field="*{item_description}"><br>
<label for="itemPrice">Item Price:</label>
<input type="number" id="itemPrice" th:field="*{item_price}"><br>
<button type="submit">Add Item</button>
</form>
</body>
</html>
