<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Customer Details</title>
<style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            color: #333;
        }
        h1 {
            text-align: center;
            color: #008080;
        }
        .details-container {
            width: 50%;
            margin: 20px auto;
            background-color: #fff;
            border: 1px solid #ddd;
            padding: 20px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
        }
        .details-container p {
            margin-bottom: 10px;
        }
        .details-container strong {
            color: #008080;
        }
        .not-found {
            text-align: center;
            color: #FF5733;
            font-style: italic;
            font-size: 18px;
        }
</style>
</head>
<body>
<h1>Customer Details</h1>
<div class="details-container" th:if="${customer != null}">
<p><strong>Customer ID:</strong> <span th:text="${customer.customer_id}"></span></p>
<p><strong>Name:</strong> <span th:text="${customer.customer_name}"></span></p>
<p><strong>Email:</strong> <span th:text="${customer.customer_email}"></span></p>
<p><strong>Phone:</strong> <span th:text="${customer.customer_phone}"></span></p>
</div>
<div class="not-found" th:if="${customer == null}">
<p>Customer not found.</p>
</div>
</body>
</html>
